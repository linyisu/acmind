<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACMind VJudge Importer</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 320px;
        padding: 16px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        color: #e0e0e0;
        background: #1a1a2e;
      }
      h2 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid #2a2a4a;
        margin-bottom: 12px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #666;
        flex-shrink: 0;
      }
      .status-dot.connected {
        background: #4ade80;
      }
      .status-dot.disconnected {
        background: #f87171;
      }
      .status-text {
        font-size: 12px;
        color: #888;
      }
      .form-group {
        margin-bottom: 10px;
      }
      .form-group label {
        display: block;
        font-size: 11px;
        color: #888;
        margin-bottom: 4px;
        font-weight: 500;
      }
      .form-group input {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #2a2a4a;
        border-radius: 4px;
        background: #0f0f23;
        color: #e0e0e0;
        font-size: 12px;
        font-family: monospace;
      }
      .form-group input:focus {
        outline: none;
        border-color: #6366f1;
      }
      .hint {
        font-size: 11px;
        color: #666;
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .hint code {
        background: #2a2a4a;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 11px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 8px 12px;
        margin: 4px 0;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        text-align: center;
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn-primary {
        background: #6366f1;
        color: #fff;
      }
      .btn-secondary {
        background: #2a2a4a;
        color: #a0a0b0;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .divider {
        border-top: 1px solid #2a2a4a;
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <h2>🧠 ACMind Importer</h2>

    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-label">Checking connection...</span>
    </div>

    <div class="form-group">
      <label for="api-url">ACMind API URL</label>
      <input
        type="text"
        id="api-url"
        placeholder="https://acmind.example.com"
      />
    </div>

    <div class="form-group">
      <label for="token">JWT Token</label>
      <input
        type="password"
        id="token"
        placeholder="eyJhbGciOi..."
      />
    </div>

    <button class="btn btn-primary" id="btn-save">Save Settings</button>

    <div class="divider"></div>

    <div class="hint">
      Open <code>vjudge.net/status</code>, navigate to your submissions, and
      click the <strong>Import</strong> button on the page.
    </div>

    <button class="btn btn-secondary" id="btn-check">Re-check Connection</button>

    <script src="popup.js"></script>
  </body>
</html>
